      min-height: max(884px, 100dvh);

<body class="min-h-screen flex flex-col font-body-md">
<!-- TopAppBar - Suppressed by Navigation Shell Rule (Transactional Page) but recreated as specific screen header -->
<header class="bg-[#1D9E75] h-[80px] w-full flex items-center px-5 justify-between sticky top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white cursor-pointer" data-icon="arrow_back">arrow_back</span>
<div class="flex flex-col">
<span class="font-lexend font-bold text-[16px] text-white leading-tight">Login</span>
<span class="font-tamil-body text-[11px] text-[#9FE1CB] leading-tight">உள்நுழைக</span>
</div>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-1 flex flex-col px-container-margin pt-xl pb-lg max-w-md mx-auto w-full">
<!-- Welcome Section -->
<section class="mb-xl">
<h1 class="font-h2 text-[#085041] mb-base">Welcome back</h1>
<p class="font-tamil-body text-[12px] text-outline opacity-80">மீண்டும் வரவேற்கிறோம்</p>
</section>
<!-- Form Section -->
<form class="flex flex-col gap-lg">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-on-surface-variant">EMAIL ADDRESS</label>
<input class="h-[50px] w-full bg-white border-[1.5px] border-[#9FE1CB] rounded-xl px-md focus:outline-none focus:border-primary transition-colors font-body-md placeholder:text-outline/50" placeholder="Enter your email" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-on-surface-variant">PASSWORD</label>
<div class="relative">
<input class="h-[50px] w-full bg-white border-[1.5px] border-[#9FE1CB] rounded-xl px-md focus:outline-none focus:border-primary transition-colors font-body-md placeholder:text-outline/50" placeholder="Enter your password" type="password"/>
</div>
<div class="flex justify-end">
<a class="text-[11px] font-bold text-[#1D9E75] hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
</div>
</div>
<!-- Login Button -->
<button class="h-[50px] w-full bg-[#1D9E75] text-white rounded-xl font-lexend font-bold flex items-center justify-center gap-2 hover:bg-primary transition-all active:scale-[0.98] shadow-sm" type="submit">
                Login · உள்நுழைக
            </button>
</form>
<!-- Divider -->
<div class="flex items-center my-xl">
<div class="flex-1 h-[1px] bg-[#9FE1CB]/50"></div>
<span class="px-md font-label-caps text-outline text-[11px]">or</span>
<div class="flex-1 h-[1px] bg-[#9FE1CB]/50"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-md">
<button class="h-[50px] w-full bg-white border-[1.5px] border-[#9FE1CB] rounded-xl flex items-center justify-center gap-3 font-body-md font-bold text-on-surface hover:bg-surface-container transition-colors active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" data-alt="A high-fidelity minimalist graphic of the Google multi-colored 'G' logo icon, set against a clean white circular background. The lighting is neutral and even, following a professional corporate tech aesthetic. The icon is crisp and perfectly centered, symbolizing modern connectivity and institutional digital services within a calm light-mode interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmffhAUEL-iIgAYtMgoknJW7nDB8tJrre-nuSvtFBsKyzCZSZkKuZ9u6ie0iBjPNbyhTiIVhbr1plncq7b9RokYdLNP1-kYqYariwoA9HILMxMwbyzdp-A7Zr9tbbXAEd0W-i-Wwd9Jgl22GvQxqT8owU4RMQswXiTkrxsQdS08n9q4S5Fqr70s-BH1vquUS965Ho0W74inzE-PZvUgxIWeod0InsXU8tPsDWSv-d-_kndwEK1aC3g-WGWM01tYqIV9TuuhBYqIcf6"/>
                Continue with Google
            </button>
</div>
<!-- Registration Footer -->
<footer class="mt-auto pt-xl text-center">
<p class="text-outline text-body-md">
                Don't have an account? 
                <a class="text-[#1D9E75] font-bold hover:underline" href="#">Register</a>
</p>
</footer>
<!-- Security Badge/Illustration (Subtle) -->
<div class="mt-xl flex flex-col items-center opacity-40">
<div class="w-full h-48 rounded-2xl overflow-hidden relative mb-md border border-outline/10">
<img alt="Legal Pillar" class="w-full h-full object-cover grayscale" data-alt="A clean, minimalist architectural photograph of classical Greek marble columns under bright, natural daylight. The composition is angled to show the strength and stability of the pillars against a clear, soft-toned sky. The lighting is high-key and airy, evoking a sense of institutional trust and judicial permanence. The overall aesthetic is professional, monochromatic, and fits perfectly into a modern corporate legal application's light-mode theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMhKopsVZQwxG1g8zzQZxCgk2z0LU_2b2eJewqsYAc4ITk34TA-caU94XdoaQ6F8eU4frnI8DmjwUw88fELhfZCaxsy4spgfSeT2bt7GbToxjhMBgKUijROvNQysbEsmv_YkQ_FEbgp59bt5IGyqrQ8L933bTfTqOuYEwFeSIGlcS1dzfCq54ShcNyXXkxJixm3KmSWZVKpMcZUFCqe1IHpAxUfDlhLVbpGqCwRKzQvQw50999Z3-VVsAh5xc3mZoG8oR2YCa1DNR0"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#F8F7F3] to-transparent"></div>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
<span class="text-[10px] font-label-caps uppercase tracking-widest">Secure Institutional Access</span>
</div>
</div>
</main>
<!-- Navigation Shell Suppressed per Logic: Transactional/Login screen should focus on the task -->
