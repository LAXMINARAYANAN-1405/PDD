</div>

                Make your choice · <span class="font-tamil-body">உங்கள் முடிவை எடுங்கள்</span>
</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-sm">
                What do you do next?
            </p>
</header>
<!-- Scenario Context Visual -->
<div class="mb-xl rounded-xl overflow-hidden shadow-sm border border-outline-variant/20">
<div class="relative h-48 w-full bg-surface-container-highest">
<img alt="Office decision context" class="w-full h-full object-cover opacity-80" data-alt="A professional yet tense modern office environment with blurred figures in the background. The lighting is bright and corporate, but the composition focuses on an empty workspace that evokes a feeling of a difficult workplace dilemma. The color palette features soothing forest greens and clean whites, maintaining an institutional yet empathetic legal educational atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOG4MX9XL9AlSOpR8jcTsFq27TYzxGJyc20dj93dHbP03BAm4_BYe00MBeed1G61N2cZAg5Uh96EpiVrlJTtuOUnXUJrZ3c_Btivlj9LxtScBNR0DAQhuAs4sZK-ldKz5pELFNwWFUcY5BjRef1r4sPeLP8bEcb2Yi3SCcYUPHDv_gSZSzgyRufvDbapf-Y8UT6Knr9MWl_kAcTquvUSbK26iySzculysUtqEuK6J1phvJ285dLrYtBhRgsF5CE_6cGiJXgaPN6cbW"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
</div>
</div>
<!-- Decision Options -->
<div class="flex flex-col gap-md">
<!-- Option 1: Passive -->
<button class="w-full text-left p-md bg-surface-container-lowest border border-outline-variant/30 rounded-[14px] hover:border-primary/50 transition-all group">
<div class="flex gap-md">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-outline group-hover:bg-primary/10 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-lexend font-semibold text-on-surface">Stay silent or resign from the job to escape.</span>
<span class="font-tamil-body text-body-md text-on-surface-variant">(அமைதியாக இருப்பது அல்லது வேலையை விட்டு விலகுவது.)</span>
</div>
</div>
</button>
<!-- Option 2: Reactive -->
<button class="w-full text-left p-md bg-surface-container-lowest border border-outline-variant/30 rounded-[14px] hover:border-primary/50 transition-all group">
<div class="flex gap-md">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-outline group-hover:bg-primary/10 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="record_voice_over">record_voice_over</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-lexend font-semibold text-on-surface">Shout at the colleague in front of everyone.</span>
<span class="font-tamil-body text-body-md text-on-surface-variant">(அனைவர் முன்பும் சக ஊழியரிடம் சத்தமிடுவது.)</span>
</div>
</div>
</button>
<!-- Option 3: Formal (Primary Path) -->
<button class="w-full text-left p-md bg-white border-2 border-primary rounded-[14px] shadow-[0_4px_12px_rgba(29,158,117,0.1)] transition-all transform active:scale-[0.98]">

<div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="description" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-lexend font-bold text-primary">File a formal written complaint to the ICC.</span>
<span class="font-tamil-body text-body-md text-on-primary-container font-medium">(உள்ளகப் புகார் குழுவிடம் (ICC) முறையான எழுத்துப்பூர்வ புகார் அளிப்பது.)</span>
</div>
<div class="ml-auto flex items-center">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
