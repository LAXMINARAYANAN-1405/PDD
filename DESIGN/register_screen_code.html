<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Public+Sans:wght@400;700&amp;family=Noto+Sans+Tamil:wght@400;700&amp;family=Lexend:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "inverse-primary": "#68dbae",
                "on-tertiary-fixed": "#002019",
                "surface-container-low": "#eff5ef",
                "on-tertiary-fixed-variant": "#095041",
                "outline-variant": "#bccac1",
                "on-secondary-fixed": "#002018",
                "on-tertiary": "#ffffff",
                "surface-bright": "#f5fbf5",
                "on-surface": "#171d1a",
                "on-primary": "#ffffff",
                "tertiary-fixed-dim": "#94d3bf",
                "primary-fixed-dim": "#68dbae",
                "background": "#f5fbf5",
                "tertiary-container": "#427f6e",
                "inverse-on-surface": "#ecf2ed",
                "inverse-surface": "#2c322e",
                "secondary-fixed-dim": "#92d4be",
                "secondary-fixed": "#adf0da",
                "on-surface-variant": "#3d4943",
                "error": "#ba1a1a",
                "surface-variant": "#dee4de",
                "error-container": "#ffdad6",
                "primary-fixed": "#86f8c9",
                "surface-container-high": "#e4eae4",
                "on-error": "#ffffff",
                "primary-container": "#008560",
                "on-primary-fixed": "#002115",
                "tertiary": "#276656",
                "outline": "#6d7a73",
                "surface-dim": "#d6dbd6",
                "surface-tint": "#006c4e",
                "on-secondary": "#ffffff",
                "on-background": "#171d1a",
                "on-tertiary-container": "#f4fff9",
                "tertiary-fixed": "#b0efdb",
                "secondary": "#276958",
                "primary": "#00694c",
                "surface": "#f5fbf5",
                "surface-container-lowest": "#ffffff",
                "on-primary-container": "#f5fff7",
                "surface-container": "#eaefea",
                "on-secondary-container": "#2e6f5d",
                "on-error-container": "#93000a",
                "on-secondary-fixed-variant": "#025140",
                "secondary-container": "#adf0da",
                "surface-container-highest": "#dee4de",
                "on-primary-fixed-variant": "#00513a"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "md": "16px",
                "container-margin": "20px",
                "xl": "32px",
                "lg": "24px",
                "gutter": "12px",
                "xs": "8px",
                "sm": "12px",
                "base": "4px"
            },
            "fontFamily": {
                "h2": ["Poppins"],
                "label-caps": ["Public Sans"],
                "h1": ["Poppins"],
                "h3": ["Poppins"],
                "body-md": ["Public Sans"],
                "body-lg": ["Public Sans"],
                "tamil-body": ["Noto Sans Tamil"],
                "lexend": ["Lexend"]
            },
            "fontSize": {
                "h2": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                "h1": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                "h3": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "tamil-body": ["16px", {"lineHeight": "26px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body { background-color: #F8F7F3; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-surface">
<!-- TopAppBar Fragmented (Transactional/Focus Screen Pattern) -->
<header class="bg-[#1D9E75] h-20 w-full flex flex-col justify-center px-container-margin z-50">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-white">arrow_back</span>
<div class="flex flex-col">
<h1 class="font-h2 text-[16px] font-bold text-white leading-tight">Create Account</h1>
<span class="font-tamil-body text-[11px] text-[#9FE1CB] leading-none">கணக்கு உருவாக்குங்கள்</span>
</div>
</div>
</header>
<main class="max-w-md mx-auto px-container-margin py-lg space-y-lg">
<!-- Form Section -->
<form class="space-y-md">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block">FULL NAME</label>
<input class="w-full h-[50px] px-md rounded-[10px] bg-white border-[1.5px] border-[#9FE1CB] focus:border-primary focus:ring-0 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block">EMAIL</label>
<input class="w-full h-[50px] px-md rounded-[10px] bg-white border-[1.5px] border-[#9FE1CB] focus:border-primary focus:ring-0 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="example@rightsquest.org" type="email"/>
</div>
<!-- Phone -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block">PHONE</label>
<input class="w-full h-[50px] px-md rounded-[10px] bg-white border-[1.5px] border-[#9FE1CB] focus:border-primary focus:ring-0 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="+91 00000 00000" type="tel"/>
</div>
<!-- Password -->
<div class="space-y-xs relative">
<label class="font-label-caps text-label-caps text-on-surface-variant block">PASSWORD</label>
<div class="relative">
<input class="w-full h-[50px] px-md rounded-[10px] bg-white border-[1.5px] border-[#9FE1CB] focus:border-primary focus:ring-0 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline">visibility</span>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs relative">
<label class="font-label-caps text-label-caps text-on-surface-variant block">CONFIRM PASSWORD</label>
<div class="relative">
<input class="w-full h-[50px] px-md rounded-[10px] bg-white border-[1.5px] border-[#9FE1CB] focus:border-primary focus:ring-0 font-body-md text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline">visibility</span>
</div>
</div>
<!-- Select District -->
<div class="space-y-xs relative">
<label class="font-label-caps text-label-caps text-on-surface-variant block">SELECT DISTRICT</label>
<div class="relative">
<select class="w-full h-[50px] px-md rounded-[10px] bg-white border-[1.5px] border-[#9FE1CB] focus:border-primary focus:ring-0 font-body-md text-on-surface appearance-none">
<option disabled="" selected="" value="">Choose your district</option>
<option value="chennai">Chennai</option>
<option value="madurai">Madurai</option>
<option value="coimbatore">Coimbatore</option>
<option value="trichy">Tiruchirappalli</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-primary pointer-events-none">expand_more</span>
</div>
</div>
<!-- Register Button -->
<div class="pt-sm">
<button class="w-full h-[54px] bg-[#1D9E75] text-white rounded-[10px] font-h3 flex items-center justify-center gap-xs shadow-md active:scale-95 transition-transform duration-150" type="submit">
<span class="font-body-md font-bold">Register</span>
<span class="opacity-40 text-sm">·</span>
<span class="font-tamil-body text-[16px]">பதிவு செய்க</span>
</button>
</div>
</form>
<!-- Footer / Login Link -->
<div class="text-center pt-md pb-lg">
<p class="font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-[#1D9E75] font-bold hover:underline" href="#">Login</a>
</p>
</div>
<!-- Compliance & Accessibility Tag -->
<div class="flex items-center justify-center gap-xs px-lg py-sm bg-secondary-container/30 rounded-full border border-secondary-container/50">
<span class="material-symbols-outlined text-on-secondary-container text-sm">verified_user</span>
<span class="font-label-caps text-[10px] text-on-secondary-container uppercase">Data Encrypted &amp; Legally Compliant</span>
</div>
</main>
<!-- Bottom Spacing for mobile viewports -->
<div class="h-10"></div>
</body></html>
