<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RightsQuest - Minimum Wages Act</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&amp;family=Public+Sans:wght@400;700&amp;family=Noto+Sans+Tamil:wght@400;700&amp;family=Lexend:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>

                "surface-dim": "#d6dbd6",

                "on-primary": "#ffffff",
                "inverse-surface": "#2c322e",
                "primary-fixed-dim": "#68dbae",
                "on-secondary-fixed-variant": "#025140",
                "on-secondary-container": "#2e6f5d",
                "surface-container": "#eaefea",
                "primary-fixed": "#86f8c9",
                "outline": "#6d7a73",
                "secondary": "#276958",
                "tertiary": "#276656",

                "tertiary-fixed-dim": "#94d3bf",

                "gutter": "12px"
            },
            "fontFamily": {
                "h3": ["Poppins"],
                "tamil-body": ["Noto Sans Tamil"],
                "label-caps": ["Public Sans"],
                "h1": ["Poppins"],
                "h2": ["Poppins"],
                "body-md": ["Public Sans"],
                "body-lg": ["Public Sans"],
                "lexend": ["Lexend"]

            "fontSize": {

                "tamil-body": ["16px", {"lineHeight": "26px", "fontWeight": "400"}],
                "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-emerald-600 dark:bg-emerald-900 text-white dark:text-emerald-50 docked full-width top-0 z-50 border-b border-emerald-700 dark:border-emerald-800 shadow-sm flex justify-between items-center w-full px-5 py-3 h-16 sticky">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-white font-bold opacity-100 p-2 hover:bg-emerald-500/20 transition-colors rounded-full" data-icon="menu">menu</button>
<span class="text-white font-lexend font-black text-xl tracking-tight">RightsQuest</span>
</div>
<button class="material-symbols-outlined text-emerald-100 opacity-80 p-2 hover:bg-emerald-500/20 transition-colors rounded-full" data-icon="account_circle">account_circle</button>
</header>
<main class="flex-grow px-container-margin py-lg max-w-xl mx-auto w-full">
<!-- Header Section -->
<section class="mb-lg">
<h1 class="font-h1 text-h1 text-primary mb-xs">Minimum Wages Act</h1>
<h2 class="font-tamil-body text-tamil-body text-on-surface-variant font-bold">குறைந்தபட்ச ஊதியச் சட்டம்</h2>
<p class="font-body-md italic text-outline mt-sm">Choose your situation · உங்கள் சூழ்நிலையைத் தேர்ந்தெடுக்கவும்</p>
</section>
<!-- Bento-style Scenario List -->
<div class="grid grid-cols-1 gap-md pb-32">
<!-- Scenario 1 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="block">block</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Unpaid salary</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">வழங்கப்படாத சம்பளம்</p>
</div>
</button>
<!-- Scenario 2 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="trending_down">trending_down</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Below minimum wage</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">குறைந்தபட்ச ஊதியத்தை விட குறைவான சம்பளம்</p>
</div>
</button>
<!-- Scenario 3 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="description">description</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">No payslip provided</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">சம்பள ரசீது வழங்கப்படாமை</p>
</div>
</button>
<!-- Scenario 4 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="content_cut">content_cut</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Unjustified deductions</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">காரணமின்றி சம்பளப் பிடித்தம்</p>
</div>
</button>
<!-- Scenario 5 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="timer">timer</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Unpaid overtime</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">கூடுதல் நேர வேலைக்கு ஊதியமின்மை</p>
</div>
</button>
<!-- Scenario 6 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="hourglass_empty">hourglass_empty</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Delayed wages</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">தாமதப்படுத்தப்படும் சம்பளம்</p>
</div>
</button>
<!-- Scenario 7 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="balance">balance</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Gender wage gap</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">பாலின அடிப்படையிலான ஊதிய வேறுபாடு</p>
</div>
</button>
<!-- Scenario 8 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="handshake">handshake</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Contract worker issues</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">ஒப்பந்தத் தொழிலாளர் ஊதியப் பிரச்சனை</p>
</div>
</button>
<!-- Scenario 9 -->
<button class="bg-surface-container-lowest border border-primary/20 rounded-xl p-md flex items-start gap-md text-left transition-transform active:scale-95 shadow-sm">
<div class="bg-primary-fixed-dim/30 w-12 h-12 flex items-center justify-center rounded-lg flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="warning">warning</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-primary">Threats for asking wages</h3>
<p class="font-tamil-body text-tamil-body text-on-surface-variant">சம்பளம் கேட்டால் மிரட்டல்</p>
</div>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-2 pb-safe bg-white dark:bg-slate-950 border-t border-emerald-100 dark:border-emerald-900/50 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-50 rounded-t-2xl">
<button class="flex flex-col items-center justify-center bg-emerald-50 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 rounded-xl px-3 py-1.5 transition-transform active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1.5 hover:text-emerald-500 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Saved</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1.5 hover:text-emerald-500 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="translate">translate</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Language</span>
</button>
</nav>
</body></html>
