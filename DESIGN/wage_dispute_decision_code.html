<!DOCTYPE html>

                    "surface-bright": "#f5fbf5",

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8F7F3; /* From style guidance level 0 */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<!-- TopAppBar -->
<header class="bg-emerald-600 dark:bg-emerald-900 text-white dark:text-emerald-50 docked full-width top-0 z-50 border-b border-emerald-700 dark:border-emerald-800 shadow-sm flex justify-between items-center w-full px-5 py-3 h-16 sticky">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-white p-2 hover:bg-emerald-500/20 transition-colors rounded-full">menu</button>
<h1 class="text-white font-lexend font-black text-xl">RightsQuest</h1>
</div>
<div class="flex items-center">
<button class="material-symbols-outlined text-white p-2 hover:bg-emerald-500/20 transition-colors rounded-full">account_circle</button>
</div>
</header>
<main class="max-w-md mx-auto pb-32">
<!-- Hero Decision Section -->
<section class="bg-primary px-container-margin py-xl text-center space-y-md">
<h2 class="font-h2 text-h2 text-white leading-tight">
                Make your choice · உங்கள் முடிவை எடுங்கள்
            </h2>
<div class="inline-block px-md py-xs bg-primary-container text-on-primary-container rounded-full text-label-caps font-bold">
                DILEMMA
            </div>
<p class="font-body-lg text-white opacity-90 italic">
                "What do you do next? · அடுத்து என்ன செய்வீர்கள்?"
            </p>
</section>
<!-- Illustration -->
<div class="px-container-margin -mt-8">
<div class="bg-white rounded-xl shadow-lg p-sm border border-on-surface/10 overflow-hidden">
<img alt="A worker facing a legal crossroad" class="w-full h-48 object-cover rounded-lg" data-alt="A cinematic, high-quality digital illustration of a South Asian laborer standing before three diverging architectural paths representing legal choices. The scene is bathed in a warm morning light with soft green and white tones reflecting the institutional trust brand identity. The lighting is focused and professional, creating an atmosphere of serious contemplation and empowerment. The style is modern corporate, clean and empathetic, with sharp focus and purposeful whitespace." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSlgatCkFYpa-usWz0lQhOCTqd9Yqd8N8Kupk66RpDJvtikjMR6IZMN1Mlv6MFPdoFsZ_59kRd0fQaq0a0_f6kdi19kH-FLySnxiHioIJ7zn-gfbyincZnswEftnnXeh5vv-X5xtx7qBKJfiXDhDbSGCPbGmxhnh8nxU8Y08BzWoJhf5cjPgTPJs8FoxWHA4TfeYD8nQICrQjtZs4etQKjieYr1n9ygsUz_ZPPB6uXCNR9zs2D-13ftqz-rG5U2Ez9bQvv5jW-hrv3"/>
</div>
</div>
<!-- Options Container (Asymmetric Layout/Bento Hint) -->
<div class="px-container-margin mt-lg space-y-md">
<!-- Option 1 -->
<button class="w-full text-left group bg-white border border-on-surface/10 rounded-xl p-md shadow-sm hover:border-primary hover:shadow-md transition-all active:scale-[0.98]">
<div class="flex gap-md items-start">
<div class="mt-1 w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:bg-primary/10 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">hourglass_empty</span>
</div>
<div class="flex-1">
<p class="font-body-md font-bold text-on-surface leading-tight">
                            Keep working silently hoping they pay eventually.
                        </p>
<p class="font-tamil-body text-on-surface-variant mt-xs">
                            பணம் கிடைக்கும் என்ற நம்பிக்கையில் அமைதியாக வேலை பார்ப்பது.
                        </p>
</div>
<span class="material-symbols-outlined text-outline-variant self-center">chevron_right</span>
</div>
</button>
<!-- Option 2 -->
<button class="w-full text-left group bg-white border border-on-surface/10 rounded-xl p-md shadow-sm hover:border-error hover:shadow-md transition-all active:scale-[0.98]">
<div class="flex gap-md items-start">
<div class="mt-1 w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:bg-error/10 group-hover:text-error transition-colors">
<span class="material-symbols-outlined">gavel</span>
</div>
<div class="flex-1">
<p class="font-body-md font-bold text-on-surface leading-tight">
                            Argue angrily and stop going to work.
                        </p>
<p class="font-tamil-body text-on-surface-variant mt-xs">
                            கோபமாக வாக்குவாதம் செய்துவிட்டு வேலைக்குச் செல்வதை நிறுத்துவது.
                        </p>
</div>
<span class="material-symbols-outlined text-outline-variant self-center">chevron_right</span>
</div>
</button>
<!-- Option 3 (Highlighted Recommendation) -->
<button class="w-full text-left group bg-primary-container/10 border-2 border-primary rounded-xl p-md shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
<div class="flex gap-md items-start">
<div class="mt-1 w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="flex-1">
<p class="font-body-md font-bold text-primary leading-tight">
                            Submit a formal written request and file a Labour complaint.
                        </p>
<p class="font-tamil-body text-on-surface mt-xs">
                            எழுத்துப்பூர்வமாக கோரிக்கை வைத்துவிட்டு, தொழிலாளர் நலத்துறையில் புகார் அளிப்பது.
                        </p>
</div>
<span class="material-symbols-outlined text-primary self-center">check_circle</span>
</div>
</button>
</div>
<!-- Progress bar for educational flow -->
<div class="px-container-margin mt-xl">
<div class="flex justify-between items-center mb-xs">
<span class="text-label-caps text-on-surface-variant">SCENARIO PROGRESS</span>
<span class="text-label-caps text-primary font-bold">Slide 23 / 30</span>
</div>
<div class="h-2 w-full bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[76%] rounded-full"></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-white dark:bg-slate-950 text-emerald-600 dark:text-emerald-400 docked full-width bottom-0 z-50 rounded-t-2xl border-t border-emerald-100 dark:border-emerald-900/50 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-2 pb-safe">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1.5 hover:text-emerald-500 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">home</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Home</span>
</button>
<!-- Learn (Active) -->
<button class="flex flex-col items-center justify-center bg-emerald-50 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300 rounded-xl px-3 py-1.5 hover:text-emerald-500 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Learn</span>
</button>
<!-- Legal Aid -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1.5 hover:text-emerald-500 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">gavel</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Legal Aid</span>
</button>
<!-- Profile -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1.5 hover:text-emerald-500 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined">person</span>
<span class="font-lexend font-medium text-[10px] uppercase tracking-wider">Profile</span>
</button>
</nav>
</body></html>
