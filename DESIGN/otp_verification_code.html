<body class="min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Section 1: Header -->
<header class="w-full h-[80px] bg-[#1D9E75] flex items-center relative shadow-sm">
<div class="absolute left-4">
<span class="material-symbols-outlined text-white text-[24px]">arrow_back</span>
</div>
<div class="w-full flex flex-col items-center justify-center">
<h1 class="font-h1 text-[16px] font-bold text-white">Verify your number</h1>
<p class="font-tamil-body text-[11px] text-[#9FE1CB]">உங்கள் எண்ணை உறுதிப்படுத்துங்கள்</p>
</div>
</header>
<main class="flex flex-col items-center w-full max-w-[400px] px-container-margin">
<!-- Section 2: Instruction Text -->
<section class="mt-[24px] flex flex-col items-center text-center">
<p class="font-h1 text-[13px] text-[#2C2C2A] w-[300px] leading-tight">
                We sent a 6 digit OTP to your phone number
            </p>
<p class="font-tamil-body text-[11px] text-[#888780] mt-[8px]">
                உங்கள் தொலைபேசி எண்ணிற்கு OTP அனுப்பப்பட்டது
            </p>
</section>
<!-- Section 3: OTP Input Boxes -->
<section class="mt-[40px] flex gap-[8px] justify-center w-full">
<input class="w-[44px] h-[54px] bg-white border-[1.5px] border-[#9FE1CB] rounded-[10px] text-center text-h2 text-on-surface focus:outline-none focus:border-primary transition-colors shadow-sm" maxlength="1" type="text"/>
<input class="w-[44px] h-[54px] bg-white border-[1.5px] border-[#9FE1CB] rounded-[10px] text-center text-h2 text-on-surface focus:outline-none focus:border-primary transition-colors shadow-sm" maxlength="1" type="text"/>
<input class="w-[44px] h-[54px] bg-white border-[1.5px] border-[#9FE1CB] rounded-[10px] text-center text-h2 text-on-surface focus:outline-none focus:border-primary transition-colors shadow-sm" maxlength="1" type="text"/>
<input class="w-[44px] h-[54px] bg-white border-[1.5px] border-[#9FE1CB] rounded-[10px] text-center text-h2 text-on-surface focus:outline-none focus:border-primary transition-colors shadow-sm" maxlength="1" type="text"/>

</section>

<section class="mt-[40px] w-full flex justify-center px-2">
<button class="w-[345px] h-[50px] bg-[#1D9E75] rounded-[10px] flex items-center justify-center shadow-[0px_4px_8px_rgba(0,0,0,0.1)] active:scale-95 transition-transform">
<span class="font-h1 text-[13px] font-bold text-white">Verify · உறுதிப்படுத்து</span>
</button>
</section>
<!-- Section 5: Resend Text -->
<section class="mt-[16px] text-center">
<p class="font-h1 text-[11px] text-[#888780]">
                Didn't receive? <span class="text-[#1D9E75] font-bold cursor-pointer hover:underline transition-all">Resend OTP</span>
</p>
