<body class="font-body-md text-on-background">

<main class="relative w-full h-screen max-w-[393px] max-h-[852px] mx-auto overflow-hidden splash-background flex flex-col items-center justify-center">

<div class="w-[8px] h-[8px] bg-white/40 rounded-full"></div>
<div class="w-[8px] h-[8px] bg-white/40 rounded-full"></div>
</div>

<svg class="w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<defs>
<radialgradient cx="50%" cy="50%" fx="50%" fy="50%" id="grad1" r="50%">
<stop offset="0%" style="stop-color:white;stop-opacity:0.2"></stop>
<stop offset="100%" style="stop-color:white;stop-opacity:0"></stop>
</radialgradient>
</defs>
<rect fill="url(#grad1)" height="100" width="100"></rect>
